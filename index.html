<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"/>
  <meta name="theme-color" content="#2b221a"/>
  <link rel="stylesheet" href="./assets/css/styles.css"/>
  <title>رفيق المسلم</title>
</head>
<body>

<header>
  <div class="header-wrap">
    <div class="brand">
      <img src="./assets/img/logo.svg" alt="الشعار" style="width:30px; margin-left:10px;"/>
      <span>رفيق المسلم</span>
    </div>
  </div>
</header>

<main>
  <section id="times" class="section active">
    <div class="card" style="margin-bottom: 15px;">
      <div class="grid">
        <div class="kpi">
          <div class="label">التاريخ الهجري</div>
          <div class="value" id="hijriDate" style="color: #d4af37;">جاري التحميل...</div>
        </div>
        <div class="kpi">
          <div class="label">المدينة</div>
          <div class="value">الرياض</div>
        </div>
      </div>
    </div>

    <div class="card">
      <table class="table">
        <thead>
          <tr><th style="text-align:right;">الصلاة</th><th style="text-align:left;">الوقت</th></tr>
        </thead>
        <tbody>
          <tr><td style="font-weight:bold;">الفجر</td><td id="t_fajr" style="text-align:left;">—</td></tr>
          <tr><td style="font-weight:bold;">الظهر</td><td id="t_dhuhr" style="text-align:left;">—</td></tr>
          <tr><td style="font-weight:bold;">العصر</td><td id="t_asr" style="text-align:left;">—</td></tr>
          <tr><td style="font-weight:bold;">المغرب</td><td id="t_maghrib" style="text-align:left;">—</td></tr>
          <tr><td style="font-weight:bold;">العشاء</td><td id="t_isha" style="text-align:left;">—</td></tr>
        </tbody>
      </table>
    </div>
  </section>

  <section id="qibla" class="section">
    <div class="card" style="text-align: center;">
      <h3 style="color: #d4af37;">اتجاه القبلة</h3>
      <div class="compass" style="margin: 30px auto; position: relative; width: 200px; height: 200px; border: 4px solid #d4af37; border-radius: 50%;">
        <div id="needle" style="position: absolute; top: 50%; left: 50%; width: 4px; height: 100px; background: #e63946; transform-origin: bottom center; transform: translate(-50%, -100%) rotate(0deg);"></div>
      </div>
      <button class="btn" id="enableCompass" style="width: 100%; margin-top: 20px;">تفعيل البوصلة</button>
    </div>
  </section>

  <section id="tasbeeh" class="section">
    <div class="card" style="text-align: center;">
      <h3 style="color: #d4af37; font-size: 1.8rem;">سُبْحَانَ اللَّهِ</h3>
      <div id="tasbeehCount" style="font-size: 5rem; font-weight: bold; margin: 20px 0;">0</div>
      <button class="btn" id="tasbeehBtn" style="width: 150px; height: 150px; border-radius: 50%; font-size: 2rem;">سَبِّح</button>
      <br><br>
      <button class="btn-secondary" id="tasbeehReset" style="padding: 10px 20px;">تصفير</button>
    </div>
  </section>

</main>

<nav class="bottom-nav">
  <button class="active" data-target="times">🕌</button>
  <button data-target="qibla">🧭</button>
  <button data-target="tasbeeh">📿</button>
</nav>

<script src="./assets/js/app.js"></script>
</body>
</html>
